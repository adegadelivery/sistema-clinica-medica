<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
        }

        .box {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }

        .alerta {
            background: #f8d7da;
            color: #842029;
            padding: 8px;
            border-radius: 5px;
            margin: 8px 0;
            font-size: 14px;
        }

        .link-cadastro {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">

    <img src="{{ url_for('static', filename='img/logo.jpg') }}"
         style="width: 100px; margin-bottom: 10px;">

    <h2>Clínica Médica</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alerta">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <input name="usuario" placeholder="Usuário">
        <input name="senha" type="password" placeholder="Senha">
        <button>Entrar</button>
    </form>

    <a href="/cadastro" class="link-cadastro">Não tem conta? Cadastre-se</a>

</div>

</body>
</html>
